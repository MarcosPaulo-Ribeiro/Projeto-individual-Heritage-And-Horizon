<body onload=" onloadEsconder(), validarSessao()">

    <div class="janela">

        <div class="header-left dash-header">

            <h1>Heritage & Horizon</h1>

            <div class="hello">
                <h3>Olá, <span id="b_usuario">usuário</span>!</h3>
            </div>

            <div class="btn-nav">
                <a href="#">
                    <h3>Teste seu conhecimento</h3>

            </div>

            <div class="btn-nav-white">

            <div class="btn-nav-white">
                <a href="./mural.html">

                <h3>Sair</h3>

        </div>

        <div class="dash">
            <div id="pontuacaoEJogo">
                <div id="container_selecao">
                    <!--botões para selecionar o tema de cada Marca-->
                    <button class="btninciar" onclick="selecionarTema('porsche')">𝓟𝓸𝓻𝓼𝓬𝓱𝓮</button>
                    <button class="btninciar" onclick="selecionarTema('genesis')">𝒢ℯ𝓃ℯ𝓈𝒾𝓈</button>
                </div>
                <div id="pontuacao" class="flex-colunar width-fit-content border-primary">
                    <div id="pontuacaoDuranteJogo" class="flex-colunar padding-8">
                        <span class="width-fit-content">Quantidade de acertos: <span id="spanCertas"></span></span>
                        <span class="width-fit-content">Quantidade de erros: <span id="spanErradas"></span></span>
                    </div>
                    <div id="pontuacaoFinalJogo" class="flex-colunar padding-8">
                        <span id="pontuacaoFinal" class="width-fit-content">Pontuação Final:
                            <span id="spanPontuacaoFinal">***</span>
                        </span>
                        <span id="msgFinal" class="width-fit-content">***</span>
                    </div>
                </div>

                <div id="jogo" class="width-fit-content flex-colunar border-secondary">

                    <div id="infoQuestao" class="padding-8">
                        <span>Questão atual: <span id="spanNumeroDaQuestaoAtual"></span> de <span
                                id="qtdQuestoes"></span>
                            questões.</span>
                    </div>

                    <div id="perguntaDaQuestaoAtual" class="padding-8">
                        <span id="spanQuestaoExibida" class="text-bold"></span>
                    </div>

                    <div id="infoAlternativas" class="padding-8">
                        <span><em>Escolha uma opção dentre as abaixo:</em></span>
                    </div>

                    <div id="opcoes" class="flex-colunar padding-8">
                        <span>
                            <input type="radio" id="primeiraOpcao" name="option" class="radio" value="alternativaA" />
                            <label for="primeiraOpcao" class="option" id="labelOpcaoUm"></label>
                        </span>
                        <span>
                            <input type="radio" id="segundaOpcao" name="option" class="radio" value="alternativaB" />
                            <label for="segundaOpcao" class="option" id="labelOpcaoDois"></label>
                        </span>
                        <span>
                            <input type="radio" id="terceiraOpcao" name="option" class="radio" value="alternativaC" />
                            <label for="terceiraOpcao" class="option" id="labelOpcaoTres"></label>
                        </span>
                        <span>
                            <input type="radio" id="quartaOpcao" name="option" class="radio" value="alternativaD" />
                            <label for="quartaOpcao" class="option" id="labelOpcaoQuatro"></label>
                        </span>
                        <span>
                            <input type="radio" id="quintaOpcao" name="option" class="radio" value="alternativaE" />
                            <label for="quintaOpcao" class="option" id="labelOpcaoCinco"></label>
                            <!--alternativa Extra-->
                        </span>
                    </div>

                    <div id="botoes" class="flex-colunar padding-8">
                        <button onclick="submeter()" id="btnSubmeter">Submeter resposta</button>
                        <button onclick="avancar()" id="btnProx" disabled>Avançar para próxima questão</button>
                        <!-- <button onclick="finalizar()" id="btnConcluir" disabled>Finalizar Quiz</button> -->
                        <button onclick="tentarNovamente()" id="btnTentarNovamente" disabled>Tentar novamente</button>
                    </div>

                </div>
            </div>
        </div>

</html>

<script>
    // botão de seleção de tema atribuindo um Quiz Diferente para o usuário
    function selecionarTema(marca) {
        if (marca == "porsche") {
            listaDeQuestoesAtuais = questoesPorsche
        } else if (marca == "genesis") {
            listaDeQuestoesAtuais = questoesGenesis
        }
        quantidadeDeQuestoes = listaDeQuestoesAtuais.length;
        iniciarQuiz()
    }

    // Perguntas Porsche
    const questoesPorsche = [



        {
            pergunta: "Qual é o modelo mais icônico da Porsche, lançado em 1963?",
            alternativaA: "911",
            alternativaB: "Cayenne",
            alternativaC: "Panamera",
            alternativaD: "Boxster",
            alternativaE: "Taycan",
            alternativaCorreta: "alternativaA"
        },
        {
            pergunta: "Qual é a Variante com a melhor velocidade em linha reta?",
            alternativaA: "GTS",
            alternativaB: "Turbo S",
            alternativaC: "GT3 RS",
            alternativaD: "4S",
            alternativaE: "Turbo",
            alternativaCorreta: "alternativaB"
        },
        {
            pergunta: "Qual é o modelo mais vendido da Porsche?",
            alternativaA: "911",
            alternativaB: "Cayenne",
            alternativaC: "Panamera",
            alternativaD: "718",
            alternativaE: "Macan",
            alternativaCorreta: "alternativaE"
        },
        {
            pergunta: "Qual é montadora é dona da Porsche?",
            alternativaA: "Audi",
            alternativaB: "BMW",
            alternativaC: "Land Rover",
            alternativaD: "Volkswagen",
            alternativaE: "Honda",
            alternativaCorreta: "alternativaD"
        },
        {
            pergunta: "Qual desses carros usa o mesmo motor de uma Porsche Cayenne?",
            alternativaA: "BMW X5",
            alternativaB: "Land Rover Defender",
            alternativaC: "Mercedes-Benz GLS",
            alternativaD: "Cadillac Escalade",
            alternativaE: "Bentley Bentayga",
            alternativaCorreta: "alternativaE"
        },
        {
            pergunta: "Qual carro introduziu a revolucionária suspensão Active Ride?",
            alternativaA: "Panamera",
            alternativaB: "Taycan",
            alternativaC: "Cayenne",
            alternativaD: "Macan",
            alternativaE: "Discovery",
            alternativaCorreta: "alternativaA"
        },
        {
            pergunta: "Qual modelo salvou a Porsche de falir?",
            alternativaA: "911",
            alternativaB: "718",
            alternativaC: "Taycan",
            alternativaD: "Cayenne",
            alternativaE: "Macan Eletric",
            alternativaCorreta: "alternativaD"
        },
        {
            pergunta: "qual foi o maior feito de rebocamento que a Porsche Cayenne S conseguiu, alcançando Recorde mundial no Guiness?",
            alternativaA: "20 Toneladas(trailer comercial)",
            alternativaB: "285 toneladas(Avião)",
            alternativaC: "120 toneladas (Ônibus espacial)",
            alternativaD: "50 toneladas(Iate de luxo)",
            alternativaE: "240 toneladas (Balsa de passageiros)",
            alternativaCorreta: "alternativaB"
        }


    ];// Perguntas Genesis
    const questoesGenesis = [

        {
            pergunta: "A Genesis é a divisão de luxo de qual montadora?",
            alternativaA: "Toyota",
            alternativaB: "Hyundai",
            alternativaC: "Honda",
            alternativaD: "Chevrolet",
            alternativaE: "MINI",
            alternativaCorreta: "alternativaB"
        },
        {

            pergunta: "Em que ano nasceu a Montadora Genesis?",
            alternativaA: "1999",
            alternativaB: "não sei",
            alternativaC: "2010",
            alternativaD: "1940",
            alternativaE: "2015",
            alternativaCorreta: "alternativaE"
        },
        {

            pergunta: "Qual é o nome da variante esportiva da Genesis?",
            alternativaA: "M Competition",
            alternativaB: "AMG",
            alternativaC: "Black Badge",
            alternativaD: "Magma",
            alternativaE: "Type R",
            alternativaCorreta: "alternativaD"
        },
        {
            pergunta: "Qual é o atual modelo Carro-chefe da Genesis?",
            alternativaA: "GV80",
            alternativaB: "G90",
            alternativaC: "GV60 Magma",
            alternativaD: "X Gran Berlinetta",
            alternativaE: "Não tenho ideia, essa marca realmente existe?",
            alternativaCorreta: "alternativaB"
        },
        {
            pergunta: "Qual é a proposta da Genesis?",
            alternativaA: "Luxo absoluto e exclusividade",
            alternativaB: "perfomance e som viceral",
            alternativaC: "silêncio e custo-benefício",
            alternativaD: "capacidade Off-road",
            alternativaE: "carros compactos e divertidos",
            alternativaCorreta: "alternativaC"
        },
        {
            pergunta: "Qual é a filosofia de Design da Genesis?",
            alternativaA: "Grades luxuosas e imponentes",
            alternativaB: "Entradas de ar agressivas",
            alternativaC: "aerofólios retráteis",
            alternativaD: "Ornamento de Capô",
            alternativaE: "Duas Linhas",
            alternativaCorreta: "alternativaE"
        },
        {
            pergunta: "Qual tipo de carroceria domina a linha atual da Genesis?",
            alternativaA: "Hatchbacks compactos",
            alternativaB: "Picapes médias",
            alternativaC: "SUVs e sedãs de luxo",
            alternativaD: "Cupês esportivos",
            alternativaE: "Minivans premium",
            alternativaCorreta: "alternativaC"
        },
        {
            pergunta: "O sedã Genesis G90 traz qual recurso inusitado está embutido para ocupantes do banco traseiro?",
            alternativaA: "Geladeira para Bebidas",
            alternativaB: "medidor de pressão arterial acoplado ao banco",
            alternativaC: "massageador térmico para as palmas das mãos",
            alternativaD: "inalador de oxigênio puro",
            alternativaE: "esterilizador por luz UV-C para celulares e objetos",
            alternativaCorreta: "alternativaE"
        }
    ];

    let listaDeQuestoesAtuais = [];


    // variáveis globais    
    let numeroDaQuestaoAtual = 0;
    let pontuacaoFinal = 0;
    let tentativaIncorreta = 0;
    let certas = 0;
    let erradas = 0;
    let quantidadeDeQuestoes;
    // let isUltima = numeroDaQuestaoAtual == quantidadeDeQuestoes-1 ? true : false

    function onloadEsconder() {
        document.getElementById('pontuacao').style.display = "none"
        document.getElementById('jogo').style.display = "none"
    }

    function iniciarQuiz() {
        document.getElementById('pontuacao').style.display = "flex"
        document.getElementById('jogo').style.display = "flex"
        document.getElementById('container_selecao').style.display = "none"

        document.getElementById('qtdQuestoes').innerHTML = quantidadeDeQuestoes

        preencherHTMLcomQuestaoAtual(0)

        btnSubmeter.disabled = false
        btnProx.disabled = true
        // btnConcluir.disabled = true
        btnTentarNovamente.disabled = true
    }

    function preencherHTMLcomQuestaoAtual(index) {
        habilitarAlternativas(true)
        const questaoAtual = listaDeQuestoesAtuais[index]
        numeroDaQuestaoAtual = index
        console.log("questaoAtual")
        console.log(questaoAtual)
        document.getElementById("spanNumeroDaQuestaoAtual").innerHTML = Number(index) + 1 // ajustando porque o index começa em 0
        document.getElementById("spanQuestaoExibida").innerHTML = questaoAtual.pergunta;
        document.getElementById("labelOpcaoUm").innerHTML = questaoAtual.alternativaA;
        document.getElementById("labelOpcaoDois").innerHTML = questaoAtual.alternativaB;
        document.getElementById("labelOpcaoTres").innerHTML = questaoAtual.alternativaC;
        document.getElementById("labelOpcaoQuatro").innerHTML = questaoAtual.alternativaD;
        document.getElementById("labelOpcaoCinco").innerHTML = questaoAtual.alternativaE; // mais uma alternativa para ficar 5 opções
    }

    function submeter() {
        const options = document.getElementsByName("option"); // recupera alternativas no html

        let hasChecked = false
        for (let i = 0; i < options.length; i++) {
            if (options[i].checked) {
                hasChecked = true
                break
            }
        }

        if (!hasChecked) {
            alert("Não há alternativas escolhidas. Escolha uma opção.")
        } else {
            btnSubmeter.disabled = true
            btnProx.disabled = false

            habilitarAlternativas(false)

            checarResposta()
        }
    }

    function habilitarAlternativas(trueOrFalse) {
        let opcaoEscolhida = trueOrFalse ? false : true

        primeiraOpcao.disabled = opcaoEscolhida
        segundaOpcao.disabled = opcaoEscolhida
        terceiraOpcao.disabled = opcaoEscolhida
        quartaOpcao.disabled = opcaoEscolhida

    }

    function avancar() {
        btnProx.disabled = true
        btnSubmeter.disabled = false

        desmarcarRadioButtons()

        if (numeroDaQuestaoAtual < quantidadeDeQuestoes - 1) {
            preencherHTMLcomQuestaoAtual(numeroDaQuestaoAtual)
            // mudei aqui, após o término do Quiz, a página congelava, mudança feita logo após adicionar o Fetch
            //  descobri que o erro não era esse, e eu não lembro como era antes
        } else if (numeroDaQuestaoAtual == quantidadeDeQuestoes - 1) {
            alert("a próxima é a questão mais difícil!")// mudança na frase final
            preencherHTMLcomQuestaoAtual(numeroDaQuestaoAtual)
        } else {
            finalizarJogo()
        }
        limparCoresBackgroundOpcoes()
    }

    function tentarNovamente() {
        // atualiza a página
        window.location.reload()
    }

    function checarResposta() {
        const questaoAtual = listaDeQuestoesAtuais[numeroDaQuestaoAtual] // questão atual 
        const respostaQuestaoAtual = questaoAtual.alternativaCorreta // qual é a resposta correta da questão atual

        const options = document.getElementsByName("option"); // recupera alternativas no html

        let alternativaCorreta = null // variável para armazenar a alternativa correta

        options.forEach((option) => {
            if (option.value === respostaQuestaoAtual) {
                console.log("alternativaCorreta está no componente: " + alternativaCorreta)
                alternativaCorreta = option.labels[0].id
            }
        })

        // verifica se resposta assinalada é correta
        options.forEach((option) => {
            if (option.checked === true && option.value === respostaQuestaoAtual) {
                document.getElementById(alternativaCorreta).classList.add("text-success-with-bg")
                pontuacaoFinal++
                certas++
                document.getElementById("spanCertas").innerHTML = certas
                numeroDaQuestaoAtual++
            } else if (option.checked && option.value !== respostaQuestaoAtual) {
                const wrongLabelId = option.labels[0].id

                document.getElementById(wrongLabelId).classList.add("text-danger-with-bg")
                document.getElementById(alternativaCorreta).classList.add("text-success-with-bg")
                tentativaIncorreta++
                erradas++
                document.getElementById("spanErradas").innerHTML = erradas
                numeroDaQuestaoAtual++
            }
        })
    }

    function limparCoresBackgroundOpcoes() {
        const options = document.getElementsByName("option");
        options.forEach((option) => {
            document.getElementById(option.labels[0].id).classList.remove("text-danger-with-bg")
            document.getElementById(option.labels[0].id).classList.remove("text-success-with-bg")
        })
    }

    function desmarcarRadioButtons() {
        const options = document.getElementsByName("option");
        for (let i = 0; i < options.length; i++) {
            options[i].checked = false;
        }
    }

    function finalizarJogo() {
        let textoParaMensagemFinal = null
        let classComCoresParaMensagemFinal = null
        const porcentagemFinalDeAcertos = pontuacaoFinal / quantidadeDeQuestoes

        if (porcentagemFinalDeAcertos <= 0.3) {
            textoParaMensagemFinal = "Ei, não fica pra baixo, ninguém é obrigado a saber tanto sobre carros nichados como esses"
            classComCoresParaMensagemFinal = "text-danger-with-bg"
        }
        else if (porcentagemFinalDeAcertos > 0.3 && porcentagemFinalDeAcertos < 0.7) {
            textoParaMensagemFinal = "Foi uma ótima tentativa, porém algumas questões estavam difíceis mesmo!"
            classComCoresParaMensagemFinal = "text-warning-with-bg"
        } else if (porcentagemFinalDeAcertos > 0, 7 && porcentagemFinalDeAcertos < 1) {
            textoParaMensagemFinal = "Ei, boa, uma pontuação Semi-Perfeita!"
            classComCoresParaMensagemFinal = "text-warning-with-bg"
        }
        else if (porcentagemFinalDeAcertos >= 1) {
            textoParaMensagemFinal = `Uau, parabéns, você acertou Todas, e é um Mestre da ${marca}!`
            classComCoresParaMensagemFinal = "text-success-with-bg"
        }

        textoParaMensagemFinal += "<br> Você acertou " + Math.round((porcentagemFinalDeAcertos) * 100) + "% das questões."


        document.getElementById('msgFinal').innerHTML = textoParaMensagemFinal
        document.getElementById('msgFinal').classList.add(classComCoresParaMensagemFinal)
        document.getElementById('spanPontuacaoFinal').innerHTML = pontuacaoFinal

        document.getElementById('jogo').classList.add("text-new-gray")

        btnProx.disabled = true
        btnSubmeter.disabled = true
        // btnConcluir.disabled = true
        btnTentarNovamente.disabled = false

        // VEM PRO BANCO DE DADOS

        // pegando o id do usuário atualmente logado
        const idUsuario = sessionStorage.ID_USUARIO;

        // dados que serão enviados para o Backend
        const dadosDoQuiz = {
            acertosServer: certas, // número de perguntas acertadas
            errosServer: erradas, // número de perguntas erradas
            marcaServer: listaDeQuestoesAtuais == questoesPorsche ? 'porsche' : 'genesis', // vê se o Quiz é da Porsche, se não for, automaticamente Genesis
            idUsuarioServer: idUsuario // Envia o ID previamente obtido por sessionStorage
        };

        // Fetch 
        // app.use("/quiz", quizRouter);
        fetch("/quiz/salvar", {
            method: "POST", // define como POST para o Routes
            headers: {
                "Content-Type": "application/json" // informa que os dados são um JSON
            },
            body: JSON.stringify(dadosDoQuiz) // Transforma os dados em JSON
        })
            .then(function (resposta) { // quando o servidor for conectado, falará uma dessas coisas, caso não conecte, vá para o .catch
                if (resposta.ok) {
                    console.log("Resultado do quiz salvo com sucesso no banco!"); // me diz se deu certo
                } else {
                    console.error("Erro ao tentar salvar o resultado do quiz no servidor."); // deu errado
                }
            })
            .catch(function (erro) {
                console.log("Houve um erro na requisição fetch: ", erro); // aqui é caso o erro não seja por parte do HTML/JavaScript
            });
    }
</script>
