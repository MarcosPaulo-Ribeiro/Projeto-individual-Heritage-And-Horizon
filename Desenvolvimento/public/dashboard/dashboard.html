    <link rel="preconnect" href="https://fonts.gstatic.com">

<body>

    <div class="janela">
        <div class="header-left">
            <h1>Heritage & Horizon</h1>

            <div class="hello">
                <h3>Olá, <span id="b_usuario">usuário</span>!</h3>
            </div>

            <div class="btn-nav-white">
                <a href="./Quizz.html">
                    <h3>Teste seu conhecimento</h3>
                </a>
            </div>

            <div class="btn-nav">

                <h3>Gráficos</h3>

            </div>

            <div class="btn-nav-white">
                <a href="./mural.html">
                    <h3>Dúvidas</h3>
                </a>
            </div>

            <div class="btn-logout" onclick="limparSessao()">
                <h3>Sair</h3>
            </div>

        </div>



        <div class="dash">
            <div id="alerta"></div>

            <div class="container-dash"
                style="padding: 20px; display: flex; flex-direction: column; gap: 40px; align-items: center; width: 100%;">

                <div class="linha-superior"
                    style="display: flex; justify-content: space-between; align-items: flex-start; width: 100%; gap: 15px;">

                    <div class="bloco-marca"
                        style="display: flex; flex-direction: column; align-items: center; gap: 15px; flex: 1;">

                            da Porsche</h3>
                        <div
                            style="width: 250px; height: 250px; background-color: #212124; padding: 15px; border-radius: 8px;">
                            <canvas id="chartQuizPorsche"></canvas>
                        </div>
                        <div class="kpi"
                            style="background-color: #212124; padding: 10px 15px; border-radius: 8px; text-align: center; width: 250px;">
                            <p style="color: #aaa; margin: 0; font-size: 13px;">Dúvidas Porsche</p>

                    <div class="kpis-globais"

                                <h2 id="kpiParticipantes"
                                    style="color: #fff; margin: 8px 0 0 0; font-family: 'Exo 2', sans-serif; font-size: 30px;">
                                    0</h2>
                            </div>
                            <div
                                style="background-color: #212124; padding: 15px; border-radius: 8px; text-align: center; width: 200px; border: 1px solid #333;">
                                <p style="color: #aaa; margin: 0; font-size: 20px; font-weight: bold;">MÉDIA ACERTOS</p>
                                <h2 id="kpiMediaAcertos"
                                    style="color: #fff; margin: 8px 0 0 0; font-family: 'Exo 2', sans-serif; font-size: 30px;">
                                    0%</h2>
                            </div>
                        </div>

                        <div
                            style="background-color: #212124; padding: 15px; border-radius: 8px; text-align: center; width: 200px; border: 1px solid #333;">
                            <p style="color: #aaa; margin: 0; font-size: 20px; font-weight: bold;">QUIZZES FEITOS</p>
                            <h2 id="kpiQuizzesRespondidos"
                                style="color: #fff; margin: 8px 0 0 0; font-family: 'Exo 2', sans-serif; font-size: 30px;">
                                0</h2>
                        </div>

                    </div>

                    <div class="bloco-marca"
                        style="display: flex; flex-direction: column; align-items: center; gap: 15px; flex: 1;">
                        <h3 style="color: white; font-family: 'Exo 2', sans-serif; margin: 0; font-size: 16px;">Acertos
                            Genesis</h3>
                        <div
                            style="width: 250px; height: 250px; background-color: #212124; padding: 15px; border-radius: 8px;">
                            <canvas id="chartQuizGenesis"></canvas>
                        </div>
                        <div class="kpi"
                            style="background-color: #212124; padding: 10px 15px; border-radius: 8px; text-align: center; width: 250px;">
                            <p style="color: #aaa; margin: 0; font-size: 13px;">Dúvidas Genesis</p>
                            <h2 id="kpiDuvidasGenesis"
                                style="color: #DAA520; margin: 5px 0 0 0; font-family: 'Exo 2', sans-serif;">0</h2>
                        </div>
                    </div>

                </div>

                <div class="linha-inferior"
                    style="display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 850px; gap: 10px; margin-top: 10px;">

                        LEADERBOARD</h2>
                    <div
                        style="width: 100%; height: 450px; background-color: #212124; padding: 20px; border-radius: 8px; border: 1px solid #2d2d30;">
                        <canvas id="chartLeaderboard"></canvas>
                    </div>
                </div>

            </div>
        </div>


</body>

</html>

<script>
    b_usuario.innerHTML = sessionStorage.NOME_USUARIO;

    let proximaAtualizacao;

    window.onload = function () {
        obterDadosGrafico();
    };

    function alterarTitulo() {
        var tituloGrafico = document.getElementById(`tituloGrafico`);
        tituloGrafico.innerHTML = "Total de Dúvidas publicadas por <span style='color: #e6005a'>Marca</span>";
    }



    // O gráfico é construído com três funções:
    // 1. obterDadosGrafico -> Traz dados do Banco de Dados para montar o gráfico da primeira vez
    // 2. plotarGrafico -> Monta o gráfico com os dados trazidos e exibe em tela
    // 3. atualizarGrafico -> Atualiza o gráfico, trazendo novamente dados do Banco

    // Esta função *obterDadosGrafico* busca os últimos dados inseridos em tabela de medidas.
    // para, quando carregar o gráfico da primeira vez, já trazer com vários dados.
    // A função *obterDadosGrafico* também invoca a função *plotarGrafico*

    //     Se quiser alterar a busca, ajuste as regras de negócio em src/controllers
    //     Para ajustar o "select", ajuste o comando sql em src/models
    function obterDadosGrafico() {

        // alterarTitulo()

        if (proximaAtualizacao != undefined) {
            clearTimeout(proximaAtualizacao);
        }

        fetch(`/duvida/estatisticas`, { cache: 'no-store' }).then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);
                    resposta.reverse();

                    plotarGrafico(resposta);

                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })

            .catch(function (error) {
                console.error(`Erro na obtenção dos dados p/ gráfico: ${error.message}`);
            });
    }
    fetch(`/duvida/leaderboard`, { cache: 'no-store' }).then(function (response) {
        if (response.ok) {
            response.json().then(function (ranking) {
                var labelsLeaderboard = [];
                var dadosLeaderboard = [];

                for (var i = 0; i < ranking.length; i++) {
                    labelsLeaderboard.push(ranking[i].nome_usuario);
                    dadosLeaderboard.push(ranking[i].pontuacao);
                }

                new Chart(document.getElementById('chartLeaderboard'), {
                    type: 'bar',
                    data: {
                        labels: labelsLeaderboard,
                        datasets: [{
                            data: dadosLeaderboard,
                            backgroundColor: ranking.map((_, i) => i % 2 === 0 ? '#E60023' : '#DAA520'),
                            borderRadius: 5
                        }]
                    },
                    options: {
                        indexAxis: 'y',
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            x: { grid: { display: false }, ticks: { color: 'white' } },
                            y: { grid: { display: false }, ticks: { color: 'white' } }
                        },
                        plugins: { legend: { display: false } }
                    }
                });
            });
        }
    });

    // Esta função *plotarGrafico* usa os dados capturados na função anterior para criar o gráfico
    // Configura o gráfico (cores, tipo, etc), materializa-o na página e, 
    // A função *plotarGrafico* também invoca a função *atualizarGrafico*

    function plotarGrafico(resposta) {

        console.log('iniciando plotagem do gráfico...');

        // Criando estrutura para plotar gráfico - labels para as marcas
        let labels = ['Porsche', 'Genesis'];

        var qtdPorsche = 0;
        var qtdGenesis = 0;

        // Arrays para o leaderboard e acertos
        var labelsLeaderboard = [];
        var dadosLeaderboard = [];
        var acertosPorsche = 0;
        var errosPorsche = 0;
        var acertosGenesis = 0;
        var errosGenesis = 0;


        for (i = 0; i < resposta.length; i++) {
            var registro = resposta[i];
            if (registro.marca == 'porsche') {
                qtdPorsche = registro.qtd;
                // Captura os acertos/erros vindos da query SQL
                acertosPorsche = registro.acertos_porsche || 0;
                errosPorsche = registro.erros_porsche || 0;
            } else if (registro.marca == 'genesis') {
                qtdGenesis = registro.qtd;
                // Captura os acertos/erros reais vindos da sua query SQL
                acertosGenesis = registro.acertos_genesis || 0;
                errosGenesis = registro.erros_genesis || 0;
            }

            // Alimenta o Leaderboard dinamicamente com os nomes e pontos do banco
            // Substitua 'nome_usuario' e 'pontuacao' pelos nomes exatos das colunas do SELECT
            if (registro.nome_usuario) {
                labelsLeaderboard.push(registro.nome_usuario);
                dadosLeaderboard.push(registro.pontuacao);
            }
        }

        // Declara 'dados' aqui para manter console.logs intactos e funcionais
        let dados = {
            labels: labels,
            datasets: [{
                label: 'Quantidade de Dúvidas',
                data: [qtdPorsche, qtdGenesis],
                backgroundColor: ['#E60023', '#DAA520'],
                borderWidth: 1
            }]
        };

        console.log('----------------------------------------------')
        console.log('Estes dados foram recebidos pela funcao "obterDadosGrafico" e passados para "plotarGrafico":')
        console.log(resposta)
        console.log('----------------------------------------------')
        console.log('O gráfico será plotado com os respectivos valores:')
        console.log('Labels:')
        console.log(labels)
        console.log('Dados:')
        console.log(dados.datasets)
        console.log('----------------------------------------------')

        document.getElementById("kpiDuvidasPorsche").innerHTML = qtdPorsche;
        document.getElementById("kpiDuvidasGenesis").innerHTML = qtdGenesis;

        // esse If Pega as resposta primeiro Vê se o BD tem respostas válidas antes de mudar as KPI
        if (resposta.length > 0) {
            document.getElementById("kpiParticipantes").innerHTML = resposta[0].total_participantes;
            document.getElementById("kpiQuizzesRespondidos").innerHTML = resposta[0].total_quizzes;
            var media = resposta[0].media_acertos;
            var kpiMedia = document.getElementById("kpiMediaAcertos"); // pega a media de acertos
            kpiMedia.innerHTML = media + "%"; // define o que está dito na KPI
            kpiMedia.style.color = media >= 50 ? '#00C851' : '#E60023'; // vê se o valor é acima ou abaixo de 50% e muda a cor
        }

        // GERANDO OS GRÁFICOS DIRETAMENTE COM AS VARIÁVEIS DO BANCO

        // Pizza - Porsche
        new Chart(document.getElementById('chartQuizPorsche'), {
            type: 'pie',
            data: {
                labels: ['Acertos', 'Erros'],
                datasets: [{
                    data: [acertosPorsche, errosPorsche], // Variáveis dinâmicas do BD
                    backgroundColor: ['#E60023', '#404044'],
                    borderWidth: 0
                }]
            },
            options: { plugins: { legend: { display: false } } }
        });

        // Pizza - Genesis
        new Chart(document.getElementById('chartQuizGenesis'), {
            type: 'pie',
            data: {
                labels: ['Acertos', 'Erros'],
                datasets: [{
                    data: [acertosGenesis, errosGenesis], // Variáveis dinâmicas do BD
                    backgroundColor: ['#DAA520', '#404044'],
                    borderWidth: 0
                }]
            },
            options: { plugins: { legend: { display: false } } }
        });

        // Barras - Leaderboard
        new Chart(document.getElementById('chartLeaderboard'), {
            type: 'bar',
            data: {
                labels: labelsLeaderboard, // Array preenchido dinamicamente pelo loop for
                datasets: [{
                    data: dadosLeaderboard,   // Array preenchido dinamicamente pelo loop for
                    backgroundColor: '#E60023',
                    borderRadius: 5
                }]
            },
            options: {
                indexAxis: 'y',
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { grid: { display: false }, ticks: { color: 'white' } },
                    y: { grid: { display: false }, ticks: { color: 'white' } }
                },
                plugins: { legend: { display: false } }
            }
        });

        setTimeout(() => atualizarGrafico(dados, null), 6000); // atualização, porém meio inútil nesse projeto
    }




    // Esta função *atualizarGrafico* atualiza o gráfico que foi renderizado na página,
    // buscando a última medida inserida em tabela contendo as capturas, 

    //     Se quiser alterar a busca, ajuste as regras de negócio em src/controllers
    //     Para ajustar o "select", ajuste o comando sql em src/models
    function atualizarGrafico(dados, myChart) {



        //fetch(`/medidas/tempo-real/${idAquario}`, { cache: 'no-store' }).then(function (response) {
        //    if (response.ok) {
        //        response.json().then(function (novoRegistro, idAquario) {
        fetch(`/duvida/estatisticas`, { cache: 'no-store' }).then(function (response) {
            if (response.ok) {
                response.json().then(function (novoRegistro) {

                    // obterdados();
                    // // alertar(novoRegistro);
                    // console.log(`Dados recebidos: ${JSON.stringify(novoRegistro)}`);
                    // console.log(`Dados atuais do gráfico:`);
                    // console.log(dados);

                    // let avisoCaptura = document.getElementById(`avisoCaptura${}`)
                    // avisoCaptura.innerHTML = ""
                    var novaQtdPorsche = 0;
                    var novaQtdGenesis = 0;

                    for (i = 0; i < novoRegistro.length; i++) {
                        var registro = novoRegistro[i];
                        if (registro.marca == 'porsche') {
                            novaQtdPorsche = registro.qtd;
                        } else if (registro.marca == 'genesis') {
                            novaQtdGenesis = registro.qtd;
                        }
                    }

                    // let avisoCaptura = document.getElementById(`avisoCaptura`)
                    // avisoCaptura.innerHTML = ""

                    // aa, entendi aqui é para ver se os novos dados são iguais aos antigos
                    if (novaQtdPorsche == dados.datasets[0].data[0] && novaQtdGenesis == dados.datasets[0].data[1]) {
                        console.log("---------------------------------------------------------------")
                        console.log("Como não há dados novos para captura, o gráfico não atualizará.")
                        // console.log("Horário do novo dado capturado:")
                        // console.log(novoRegistro[0].momento_grafico)
                        // console.log("Horário do último dado capturado:")
                        // console.log(dados.labels[dados.labels.length - 1])
                        console.log("---------------------------------------------------------------")
                    } else {
                        // tirando e colocando valores no gráfico
                        //    dados.labels.shift(); // apagar o primeiro
                        //    dados.labels.push(novoRegistro[0].momento_grafico); // incluir um novo momento

                        //    dados.datasets[0].data.shift();  // apagar o primeiro de umidade
                        //    dados.datasets[0].data.push(novoRegistro[0].umidade); // incluir uma nova medida de umidade

                        //    dados.datasets[1].data.shift();  // apagar o primeiro de temperatura
                        //    dados.datasets[1].data.push(novoRegistro[0].temperatura); // incluir uma nova medida de temperatura

                        // Atualiza os dados do dataset com os novos valores coletados do banco
                        dados.datasets[0].data[0] = novaQtdPorsche;
                        dados.datasets[0].data[1] = novaQtdGenesis;

                        document.getElementById("kpiDuvidasPorsche").innerHTML = novaQtdPorsche; // atualiza KPI
                        document.getElementById("kpiDuvidasGenesis").innerHTML = novaQtdGenesis; // atualiza KPI
                        // Atualiza os blocos centrais
                        document.getElementById("kpiParticipantes").innerHTML = novoRegistro[0].total_participantes; // atualiza KPI
                        document.getElementById("kpiQuizzesRespondidos").innerHTML = novoRegistro[0].total_quizzes; // Atualiza KPI
                        var mediaAtualizada = novoRegistro[0].media_acertos;
                        var kpiMediaAtualizada = document.getElementById("kpiMediaAcertos"); // Atualiza KPI
                        kpiMediaAtualizada.innerHTML = mediaAtualizada + "%";
                        kpiMediaAtualizada.style.color = mediaAtualizada >= 50 ? '#00C851' : '#E60023'; // corzinha bunitinha

                    }

                    // Altere aqui o valor em ms se quiser que o gráfico atualize mais rápido ou mais devagar
                    // . . . Meio que não tem como o meu gráfico atualizar em tempo real, mas aumentei para não poluir muito o CMD
                    proximaAtualizacao = setTimeout(() => atualizarGrafico(dados, myChart), 10000);
                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
                // Altere aqui o valor em ms se quiser que o gráfico atualize mais rápido ou mais devagar
                proximaAtualizacao = setTimeout(() => atualizarGrafico(dados, myChart), 2000);
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados p/ gráfico: ${error.message}`);
            });

    }
</script>
