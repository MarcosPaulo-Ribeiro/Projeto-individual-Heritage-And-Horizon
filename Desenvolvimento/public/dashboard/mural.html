<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="shortcut icon" href="../assets/icon/Ambas-16x16.png" type="image/x-icon">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dúvidas | Heritage & Horizon</title>

    <link rel="stylesheet" href="./../css/dashboards.css">
    <link rel="stylesheet" href="./../css/estilo.css" />
    <script src="../js/sessao.js"></script>
    <script src="./../js/alerta.js"></script>

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>

<body onload="validarSessao(), atualizarFeed()" style="background-color: #161618;">

    <div id="div_erros_login" style="display: none;"></div>

    <div class="janela">


        <div class="header-left">

            <h1>Heritage & Horizon</h1>

            <div class="hello">
                <h3>Olá, <span id="b_usuario">usuário</span>!</h3>
            </div>

            <div class="btn-nav-white">
                <a href="Quizz.html">
                    <h3>Teste seu conhecimento</h3>
                </a>
            </div>

            <div class="btn-nav-white">
                <a href="./dashboard.html">
                    <h3>Gráficos</h3>
                </a>
            </div>

            <div class="btn-nav">
                <h3>Dúvidas</h3>
            </div>

            <div class="btn-logout" onclick="limparSessao()">
                <h3>Sair</h3>
            </div>

        </div>

        <div class="dash-right">

            <!-- TUDO QUE TINHA idAvisos eu mudei para "idDuvida -- o mesmo vale para descricao, que virou pergunta "-->
            <div class="avisos">
                <div id="alerta">
                </div>
                <div class="container">
                    <h1>Publicar uma Dúvida</h1>
                    <div class="div-form">
                        <form id="form_postagem" method="post" onsubmit="return publicar()">
                            <label>
                                Título:
                                <br>
                                <input name="titulo" id="titulo" maxlength="100" type="text">
                            </label>
                            <br>
                            <br>
                            <label>
                                Pergunta (máximo de 300 caracteres):
                                <br>
                                <textarea name="pergunta" id="textarea_pergunta" maxlength="300" rows="5"></textarea>
                            </label>
                            <br>
                            <br>
                            <label><!-- novo Input para pegar a Marca selecionada-->
                                <label>
                                    Selecione a marca que você tem Dúvida:
                                    <br><br>
                                    <div class="div-radios">
                                        <label for="radio_porsche">Porsche</label>
                                        <input type="radio" id="radio_porsche" name="marca_radio" value="porsche">
                                        <label for="radio_genesis">Genesis</label>
                                        <input type="radio" id="radio_genesis" name="marca_radio" value="genesis"> 
                                    </div>
                                </label>

                            </label>
                            <button>Enviar</button>
                        </form>
                    </div>
                    <h1>Mural de Dúvidas</h1>
                    <div class="div-results">
                        <div id="feed_container" class="feed-container">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>




</body>

</html>

<script>
    // já que a estrutura desse HTML foi feita para isso, não houve muitas mudanças
    // maior parte das mudanças foi trocar Aviso para Duvida e adicionar nova Var para Porsche ou Genesis

    b_usuario.innerHTML = sessionStorage.NOME_USUARIO;

    function limparFormulario() {
        document.getElementById("form_postagem").reset();
    }

    function publicar() {
        var idUsuario = sessionStorage.ID_USUARIO;
        var temaSelecionado = document.querySelector('input[name="marca_radio"]:checked').value; // variável do tema Porsche/Genesis

        var corpo = {
            titulo: form_postagem.titulo.value,
            pergunta: form_postagem.pergunta.value, // trocado para pergunta
            marca: temaSelecionado // adição do campo Tema ao mural de dúvidas
        }

        fetch(`/duvida/publicar/${idUsuario}`, {
            method: "post",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(corpo)
        }).then(function (resposta) {

            console.log("resposta: ", resposta);

            if (resposta.ok) {
                window.alert("Post realizado com sucesso pelo usuario de ID: " + idUsuario + "!");
                window.location = "/dashboard/mural.html";
                limparFormulario();
                finalizarAguardar();
            } else if (resposta.status == 404) {
                window.alert("Deu 404!");
            } else {
                throw ("Houve um erro ao tentar realizar a postagem! Código da resposta: " + resposta.status);
            }
        }).catch(function (resposta) {
            console.log(`#ERRO: ${resposta}`);
            finalizarAguardar();
        });

        return false;

    }

    function editar(idDuvida) {
        sessionStorage.ID_POSTAGEM_EDITANDO = idDuvida;
        console.log("cliquei em editar - " + idDuvida);
        window.alert("Você será redirecionado à página de edição do Dúvidas de id número: " + idDuvida);
        window.location = "/dashboard/edicao-aviso.html"

    }

    function deletar(idDuvida) {
        console.log("Criar função de apagar post escolhido - ID" + idDuvida);
        fetch(`/duvida/deletar/${idDuvida}`, {
            method: "DELETE",
            headers: {
                "Content-Type": "application/json"
            }
        }).then(function (resposta) {

            if (resposta.ok) {
                window.alert("Post deletado com sucesso pelo usuario de email: " + sessionStorage.getItem("EMAIL_USUARIO") + "!");
                window.location = "/dashboard/mural.html"
            } else if (resposta.status == 404) {
                window.alert("Deu 404!");
            } else {
                throw ("Houve um erro ao tentar realizar a postagem! Código da resposta: " + resposta.status);
            }
        }).catch(function (resposta) {
            console.log(`#ERRO: ${resposta}`);
        });
    }

    function atualizarFeed() {
        fetch("/duvida/listar").then(function (resposta) {
            if (resposta.ok) {
                if (resposta.status == 204) {
                    var feed = document.getElementById("feed_container");
                    var mensagem = document.createElement("span");
                    mensagem.innerHTML = "Nenhum resultado encontrado."
                    feed.appendChild(mensagem);
                    throw "Nenhum resultado encontrado!!";
                }

                resposta.json().then(function (resposta) {
                    console.log("Dados recebidos: ", JSON.stringify(resposta));

                    var feed = document.getElementById("feed_container");
                    feed.innerHTML = "";
                    for (let i = 0; i < resposta.length; i++) {
                        var publicacao = resposta[i];

                        // criando e manipulando elementos do HTML via JavaScript
                        var divPublicacao = document.createElement("div");
                        var spanID = document.createElement("span");
                        var spanTitulo = document.createElement("span");
                        var spanNome = document.createElement("span");
                        var spanMarca = document.createElement("span")
                        var divPergunta = document.createElement("div"); 
                        var divButtons = document.createElement("div");
                        var btnEditar = document.createElement("button");
                        var btnDeletar = document.createElement("button");


                        spanID.innerHTML = "ID: <b>" + publicacao.idDuvida + "</b>";
                        spanTitulo.innerHTML = "Título: <b>" + publicacao.titulo + "</b>";
                        spanNome.innerHTML = "Autor: <b>" + publicacao.nome + "</b>";
                        spanMarca.innerHTML = "Marca <b>" + publicacao.marca + "</b>"
                        divPergunta.innerHTML = "Pergunta: <b>" + publicacao.pergunta + "</b>"; 
                        btnEditar.innerHTML = "Editar";
                        btnDeletar.innerHTML = "Deletar";

                        divPublicacao.className = "publicacao";
                        spanTitulo.id = "inputNumero" + publicacao.idDuvida;
                        spanNome.className = "publicacao-nome";
                        spanMarca.className = "publicacao-Marca"
                        spanTitulo.className = "publicacao-titulo";
                        divPergunta.className = "publicacao-pergunta"; 

                        divButtons.className = "div-buttons"

                        btnEditar.className = "publicacao-btn-editar"
                        btnEditar.id = "btnEditar" + publicacao.idDuvida;
                        btnEditar.setAttribute("onclick", `editar(${publicacao.idDuvida})`);

                        btnDeletar.className = "publicacao-btn-editar"
                        btnDeletar.id = "btnDeletar" + publicacao.idDuvida;
                        btnDeletar.setAttribute("onclick", `deletar(${publicacao.idDuvida})`);

                        divPublicacao.appendChild(spanID);
                        divPublicacao.appendChild(spanNome);
                        divPublicacao.appendChild(spanTitulo);
                        divPublicacao.appendChild(spanMarca); // Adicionado para vir o nome da marac junto
                        divPublicacao.appendChild(divPergunta);
                        divPublicacao.appendChild(divButtons);
                        divButtons.appendChild(btnEditar);
                        divButtons.appendChild(btnDeletar);
                        feed.appendChild(divPublicacao);
                    }

                    finalizarAguardar();
                });
            } else {
                throw ('Houve um erro na API!');
            }
        }).catch(function (resposta) {
            console.error(resposta);
            finalizarAguardar();
        });
    }

</script>
